<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Inteligente</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🛒 Compra Inteligente</h1>

        <p class="descricao">
            Descubra se vale a pena comprar um produto agora ou esperar.
            A análise utiliza pesquisas recentes da internet e inteligência artificial.
        </p>

        <div class="busca">

            <input
                type="text"
                id="produto"
                placeholder="Ex: RTX 4060, Ryzen 5700X, RTX 4060 vs RTX 4070">

            <button id="buscar">
                Analisar
            </button>

        </div>

        <div id="resultado">

            <p class="inicio">
                Digite um produto acima para começar.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
